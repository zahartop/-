# Trusted proxy CIDRs (Docker internal networks).
# User → edge nginx: ignore client X-Forwarded-For, send only $remote_addr.
# Trusted nginx → next hop: append $remote_addr to the chain.

geo $xff_trusted_upstream {
    default 0;
    10.0.0.0/8      1;
    172.16.0.0/12   1;
    192.168.0.0/16  1;
}

map $xff_trusted_upstream $xff_outbound {
    0 $remote_addr;
    1 $proxy_add_x_forwarded_for;
}
