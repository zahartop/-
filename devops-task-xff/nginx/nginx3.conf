server {
    listen 80;
    server_name nginx3;

    include /etc/nginx/snippets/trusted_xff.conf;

    location = / {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://app:8080/;
    }

    location /via/app/ {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://app:8080/;
    }

    location /via/nginx1/ {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://nginx1/;
    }

    location /via/nginx2/ {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://nginx2/via/app/;
    }
}
