server {
    listen 80;
    server_name nginx1;

    include /etc/nginx/snippets/trusted_xff.conf;

    location = / {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://app:8080/;
    }

    # Chain: nginx1 → nginx2 → app
    location /via/nginx2/ {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://nginx2/via/app/;
    }

    # Chain: nginx1 → nginx2 → nginx3 → app
    location /via/nginx2-nginx3/ {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://nginx2/via/nginx3/;
    }

    # Chain: nginx1 → nginx3 → app
    location /via/nginx3/ {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://nginx3/via/app/;
    }
}
