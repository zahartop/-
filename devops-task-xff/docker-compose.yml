# DevOps test: trusted X-Forwarded-For through nginx chain
name: xff-test

services:
  app:
    build: ./app
    expose:
      - "8080"
    networks:
      - internal

  nginx1:
    image: nginx:1.27-alpine
    ports:
      - "8001:80"
    volumes:
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/nginx1.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - internal

  nginx2:
    image: nginx:1.27-alpine
    ports:
      - "8002:80"
    volumes:
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/nginx2.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - internal

  nginx3:
    image: nginx:1.27-alpine
    ports:
      - "8003:80"
    volumes:
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/nginx3.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge
