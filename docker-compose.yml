# Имя проекта явно: репозиторий на GitHub называется «-», иначе Compose не может вывести name из папки
name: z-tech

services:
  web:
    build: .
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run:size=1m
      - /tmp:size=8m

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: "8080"
      TRUST_PROXY: "1"
      RATE_LIMIT_PER_MIN: "5"
      DEBUG_ERRORS: "${DEBUG_ERRORS:-0}"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8081,http://127.0.0.1:8081,https://z-tech.pro,https://www.z-tech.pro}
    volumes:
      - ./telegram.local.json:/app/telegram.local.json:ro
    expose:
      - "8080"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=16m
