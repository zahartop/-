title = "Z-TECH gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Примеры, заглушки и публичные шаблоны"
paths = [
  '''telegram\.config\.example\.json$''',
  '''\.env\.example$''',
]
regexes = [
  '''YOUR_TOKEN''',
  '''YOUR_CHAT_ID''',
  '''YOUR_BOT_TOKEN''',
  '''PLACEHOLDER_BOT_TOKEN''',
  '''ВСТАВЬТЕ_ТОКЕН''',
  '''ВАШ_CHAT_ID''',
  '''123456789:AAHxxxxxxxx''',
  '''xxxx''',
]
