map $uri $asset_cache_control {
    default "";
    ~\.(css|js|html)$ "no-cache, must-revalidate";
    ~\.(woff2?)$ "public, max-age=604800, immutable";
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    limit_conn conn 40;

    gzip on;
    gzip_types text/css application/javascript text/html application/json;
    gzip_min_length 256;

    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* (?:^|/)\.(?:env|git|htaccess) {
        deny all;
        return 404;
    }

    location ~* \.(?:json|py|sh|yml|yaml|md|csv|xlsx)$ {
        deny all;
        return 404;
    }

    location ~* /(?:telegram|outreach|scripts|node_modules)/ {
        deny all;
        return 404;
    }

    location = /api/audit {
        limit_req zone=api burst=2 nodelay;
        limit_req_status 429;

        client_max_body_size 2k;
        client_body_timeout 5s;

        if ($request_method != POST) {
            return 405;
        }

        proxy_pass http://api:8080/api/audit;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
    }

    location /api/ {
        return 404;
    }

    location ^~ /tg-proxy/ {
        return 410;
    }

    location / {
        limit_req zone=static burst=60 nodelay;

        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security $hsts_header always;
    add_header Content-Security-Policy $csp_policy always;
    add_header Cache-Control $asset_cache_control always;
}
