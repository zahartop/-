worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Rate limits (defense in depth; API has its own limiter)
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=static:10m rate=120r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    map $http_x_forwarded_proto $hsts_header {
        default "";
        https   "max-age=63072000; includeSubDomains; preload";
    }

    # upgrade-insecure-requests только за HTTPS — иначе localhost ломает CSS/JS
    map $http_x_forwarded_proto $csp_policy {
        default "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'";
        https   "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; upgrade-insecure-requests";
    }

    include /etc/nginx/conf.d/*.conf;
}
