# Z-TECH — z-tech.pro → Docker :8081

server {
    listen 80;
    listen [::]:80;
    server_name z-tech.pro www.z-tech.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://z-tech.pro$request_uri;
    }
}

# www → основное зеркало (совпадает с Host в robots.txt и canonical)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.z-tech.pro;

    ssl_certificate     /etc/letsencrypt/live/z-tech.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/z-tech.pro/privkey.pem;
    include /srv/site/nginx/vhosts/ssl-params.conf;

    return 301 https://z-tech.pro$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name z-tech.pro;

    ssl_certificate     /etc/letsencrypt/live/z-tech.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/z-tech.pro/privkey.pem;
    include /srv/site/nginx/vhosts/ssl-params.conf;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;

    location / {
        proxy_pass http://ZTECH_UPSTREAM_HOST:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
