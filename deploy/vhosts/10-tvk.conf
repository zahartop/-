# ТВК ПЛАСТИК — свой сертификат и upstream (отдельно от z-tech.pro).
# TVK_UPSTREAM_HOST / TVK_UPSTREAM_PORT подставляются скриптом.

server {
    listen 80;
    listen [::]:80;
    server_name твкпластик.рф www.твкпластик.рф tvkplastic.ru www.tvkplastic.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://твкпластик.рф$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name твкпластик.рф www.твкпластик.рф tvkplastic.ru www.tvkplastic.ru;

    ssl_certificate     /etc/letsencrypt/live/xn--80aacf5bc0a3b.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80aacf5bc0a3b.xn--p1ai/privkey.pem;
    include /srv/site/nginx/vhosts/ssl-params.conf;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;

    location / {
        proxy_pass http://TVK_UPSTREAM_HOST:TVK_UPSTREAM_PORT;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
