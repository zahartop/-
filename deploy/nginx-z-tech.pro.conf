# Фрагмент для существующего nginx (site_prod-nginx-1).
# Z-TECH слушает на хосте 127.0.0.1:8081 (docker compose без docker-compose.vps.yml).
#
# Скопируйте в conf.d проекта site_prod и reload nginx:
#   docker exec site_prod-nginx-1 nginx -t
#   docker exec site_prod-nginx-1 nginx -s reload

server {
    listen 80;
    server_name z-tech.pro www.z-tech.pro;

    # Сжатие на внешнем nginx (если контейнер Z-TECH отдаёт без gzip)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/css
        application/javascript
        text/html
        application/json
        image/svg+xml
        text/plain;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}

# Если SSL уже на site_prod-nginx (443), добавьте аналогичный server { listen 443 ssl; ... }
# с теми же ssl_certificate / ssl_certificate_key, что у других доменов.
