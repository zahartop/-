# Только Z-TECH — HTTP :80 → Docker :8081
# Для продакшена с HTTPS используйте deploy/nginx-vps-split.conf (отдельный ssl_certificate).

server {
    listen 80;
    listen [::]:80;
    server_name z-tech.pro www.z-tech.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript text/html application/json image/svg+xml text/plain;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}

