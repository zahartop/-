# Раздельные vhost для site_prod-nginx (или хостового nginx на VPS).
# Каждый домен — свой server_name, свой сертификат, свой upstream.
#
# Z-TECH Docker: 127.0.0.1:8081
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# ТВК ПЛАСТИК: укажите порт своего контейнера (пример 8080 или 80 внутри другого compose).
#
# Установка (пример для Docker nginx site_prod):
#   1) Скопировать в проект site_prod, например: conf.d/00-z-tech.conf и conf.d/10-tvk.conf
#   2) Убрать старые дублирующие server { } для тех же server_name
#   3) certbot (см. deploy/SSL-DOMAINS.md)
#   4) nginx -t && nginx -s reload
#
# ВАЖНО: не используйте один ssl_certificate на оба домена.
# ВАЖНО: не ставьте default_server на 443 у блока ТВК, если не понимаете зачем.

# ─── Z-TECH: HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name z-tech.pro www.z-tech.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://z-tech.pro$request_uri;
    }
}

# ─── Z-TECH: HTTPS → Docker :8081 ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name z-tech.pro www.z-tech.pro;

    ssl_certificate     /etc/letsencrypt/live/z-tech.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/z-tech.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript text/html application/json image/svg+xml text/plain;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}

# ─── ТВК ПЛАСТИК: HTTP → HTTPS ─────────────────────────────────────────────
# Punycode для твкпластик.рф: xn--80aacf5bc0a3b.xn--p1ai (проверьте: certbot certificates)
server {
    listen 80;
    listen [::]:80;
    server_name твкпластик.рф www.твкпластик.рф tvkplastic.ru www.tvkplastic.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://твкпластик.рф$request_uri;
    }
}

# ─── ТВК ПЛАСТИК: HTTPS → свой upstream ────────────────────────────────────
# Замените TVK_UPSTREAM_PORT на порт контейнера ТВК (НЕ 8081).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name твкпластик.рф www.твкпластик.рф tvkplastic.ru www.tvkplastic.ru;

    # Путь после certbot — смотрите: certbot certificates
    # Часто для .рф: /etc/letsencrypt/live/xn--80aacf5bc0a3b.xn--p1ai/
    ssl_certificate     /etc/letsencrypt/live/xn--80aacf5bc0a3b.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80aacf5bc0a3b.xn--p1ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript text/html application/json image/svg+xml text/plain;

    location / {
        proxy_pass http://127.0.0.1:TVK_UPSTREAM_PORT;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
